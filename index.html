<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>劳务筛选系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f5f5f5;padding:12px;padding-bottom:80px;}
.head{text-align:center;padding:14px 0;font-size:18px;font-weight:bold;color:#333}
.head-small{font-size:14px;color:#999;font-weight:normal;margin-left:6px}

.search-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;}
.search-row input{flex:1;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;}
.search-row .btn{flex:1;white-space:nowrap;}

.btn-row-top{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.btn-row-top .btn{flex:1;white-space:nowrap;}

.btn-row-bottom{display:flex;gap:8px;}
.btn-row-bottom .btn{flex:1;white-space:nowrap;}
#factoryCount{flex:1;display:flex;align-items:center;justify-content:center;
font-size:14px;font-weight:bold;background:#fff;border:1px solid #ddd;
border-radius:8px;padding:12px;color:#333;white-space:nowrap;}

.btn{display:block;width:100%;padding:12px;background:#2a85ff;color:white;border:none;border-radius:8px;margin:0;cursor:pointer}
.btn-export{background:#13c3c2;}
.btn-import{background:#52c31a;}
.btn-compare{background:#faad16;}
.btn-reset{background:#1890ff;}
.btn-delete-selected{background:#f5222d;color:#fff;}
.btn-cancel-selected{background:#999;}

.save-back-row{display:flex;gap:8px;margin-top:10px;}
.save-back-row .btn{flex:1;}

.fixed-bottomBar{
position:fixed;bottom:0;left:0;right:0;
background:#fff;padding:10px 12px;
box-shadow:0 -2px 8px rgba(0,0,0,0.1);
display:flex;gap:10px;z-index:999;
}
.fixed-bottomBar .btn{flex:1;margin:0;padding:12px;}

.filter{background:white;padding:10px;border-radius:8px;margin-bottom:10px}
.filter-row{margin-bottom:8px}
.filter-label{font-size:14px;color:#666;margin-bottom:4px}
.quick-btn{padding:6px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;font-size:13px;cursor:pointer;margin:2px}
.quick-btn.active{background:#2a85ff;color:white;border-color:#2a85ff}

.factory-item{
background:white;padding:12px;border-radius:8px;margin-bottom:8px;
display:flex;align-items:flex-start;gap:10px;
transition:all 0.2s
}
.factory-item.highlight{border:2px solid #00c48;background:#f0fff9;}
.factory-item.paused{background-color:#fff7e6;border:1px solid #faad16;}
.factory-item.paused .paused-label{color:#faad16;font-size:12px;margin-bottom:4px;display:block;}
.factory-content{flex:1;}
.factory-name{font-size:16px;font-weight:bold;margin-bottom:4px}
.factory-info{font-size:14px;color:#555;line-height:1.5;margin-bottom:10px;}
.phone-link{color:#2a85ff;text-decoration:underline;cursor:pointer;}
.map-link{color:#1890ff;text-decoration:underline;font-weight:bold;}

.factory-detail-actions{display:flex;gap:8px;margin-top:10px;}
.detail-action-btn{flex:1;padding:8px;border-radius:6px;border:none;cursor:pointer;font-size:13px;}
.delete-btn{background:#f5222d;color:white;}
.pause-btn{background:#faad16;color:white;}
.resume-btn{background:#52c41a;color:white;}

.page{display:none}
.page.active{display:block}
.age-box{display:flex;gap:8px;align-items:center}
#ageShow{font-size:14px;color:#666}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;z-index:999}
.modal-body{background:#fff;padding:15px;border-radius:10px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;display:flex;flex-direction:column;}
.modal-content{flex:1;overflow-y:auto;padding-bottom:10px;}
.modal-footer{position:sticky;bottom:0;left:0;right:0;background:#fff;padding-top:10px;border-top:1px solid #eee;}
.modal-body input{width:100%;margin:5px 0;padding:8px;border:1px solid #ddd;border-radius:5px}
.modal-body textarea{width:100%;height:150px;padding:8px;border:1px solid #ddd;border-radius:5px;margin:10px 0;resize:none}
.modal-btn{display:flex;gap:10px;margin-top:10px}
.modal-btn button{flex:1;padding:8px;border-radius:5px;border:none;cursor:pointer}
.btn-save{background:#2a85ff;color:white}
.btn-cancel{background:#f5f5f;color:#666}

.input-item{margin-bottom:12px}
.input-item label{display:block;font-size:14px;color:#333;margin-bottom:4px}
.input-item input{width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;}
.quick-group{display:flex;gap:6px;margin:4px 0 8px 0;flex-wrap:wrap}
.file-upload{display:none}
.upload-tip{font-size:12px;color:#999;text-align:center;margin:8px 0}
.duplicate-checkbox{width:18px;height:18px;margin-top:4px;}
.multi-input-row{display:flex;gap:8px;margin-bottom:8px;}
.multi-input-row input{flex:1;}
</style>
</head>
<body>

<div id="page-list" class="page active">
  <div class="head">劳务筛选系统 <span class="head-small">创才劳务</span></div>
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="搜索工厂名称..." oninput="doSearch()">
    <button class="btn" onclick="goAddPage()">+ 新增工厂</button>
  </div>
  <div class="btn-row-top">
    <button class="btn btn-export" onclick="exportFactoryToTxt()">导出信息</button>
    <button class="btn btn-import" onclick="openImportModal()">导入资料</button>
    <button class="btn btn-compare" onclick="compareAndMarkDuplicates()">重复查询</button>
  </div>
  <div class="btn-row-bottom">
    <button class="btn btn-reset" onclick="resetAllFilters()">重置筛选</button>
    <div id="factoryCount">当前共：0 个工厂</div>
  </div>
  <div class="filter">
    <div class="filter-row">
      <label class="filter-label">年龄筛选</label>
      <div class="age-box">
        <button class="quick-btn" onclick="resetAge()">不限</button>
        <input type="range" id="ageSlider" min="16" max="60" value="30" oninput="updateAge()">
        <div id="ageShow">年龄：不限</div>
      </div>
    </div>
    <div class="filter-row"><label class="filter-label">地区</label><div id="filter-area"></div></div>
    <div class="filter-row"><label class="filter-label">工种</label><div id="filter-work"></div></div>
    <div class="filter-row"><label class="filter-label">性别</label><div id="filter-gender"></div></div>
    <div class="filter-row"><label class="filter-label">工价</label><div id="filter-salary"></div></div>
    <div class="filter-row"><label class="filter-label">工作时间</label><div id="filter-time"></div></div>
    <div class="filter-row"><label class="filter-label">福利</label><div id="filter-welfare"></div></div>
  </div>
  <div id="factory-list"></div>
  <div class="fixed-bottomBar" id="fixedBottomBar" style="display:none;">
    <button class="btn btn-cancel-selected" onclick="cancelDuplicateSelection()">取消</button>
    <button class="btn" onclick="selectAllDuplicates()" style="background:#36b3a6;color:white;">全选</button>
    <button class="btn btn-delete-selected" onclick="deleteSelectedDuplicates()">删除勾选</button>
  </div>
</div>

<div id="page-add" class="page">
  <div class="head">新增工厂</div>
  <div class="input-item"><label>工厂名称</label><input id="name"></div>
  <div class="input-item">
    <label>地区</label>
    <div class="quick-group">
      <button class="quick-btn" onclick="fillArea('马山')">马山</button>
      <button class="quick-btn" onclick="fillArea('胡埭')">胡埭</button>
      <button class="quick-btn" onclick="fillArea('雪堰桥')">雪堰桥</button>
    </div>
    <input id="area">
  </div>
  <div class="input-item">
    <label>工种（最多5个，非必填）</label>
    <div class="multi-input-row"><input id="work1" placeholder="工种1"><input id="work2" placeholder="工种2"></div>
    <div class="multi-input-row"><input id="work3" placeholder="工种3"><input id="work4" placeholder="工种4"></div>
    <div class="multi-input-row"><input id="work5" placeholder="工种5"></div>
  </div>
  <div class="input-item">
    <label>性别要求</label>
    <div class="quick-group">
      <button class="quick-btn" onclick="fillGender('男')">男</button>
      <button class="quick-btn" onclick="fillGender('女')">女</button>
      <button class="quick-btn" onclick="fillGender('不限')">不限</button>
    </div>
    <input id="gender">
  </div>
  <div class="input-item">
    <label>工价（最多5个，非必填）</label>
    <div class="multi-input-row"><input id="price1" placeholder="工价1"><input id="price2" placeholder="工价2"></div>
    <div class="multi-input-row"><input id="price3" placeholder="工价3"><input id="price4" placeholder="工价4"></div>
    <div class="multi-input-row"><input id="price5" placeholder="工价5"></div>
  </div>
  <div class="input-item">
    <label>工作时间（最多5个，非必填）</label>
    <div class="multi-input-row"><input id="time1" placeholder="时间1"><input id="time2" placeholder="时间2"></div>
    <div class="multi-input-row"><input id="time3" placeholder="时间3"><input id="time4" placeholder="时间4"></div>
    <div class="multi-input-row"><input id="time5" placeholder="时间5"></div>
    <div class="quick-group">
      <button class="quick-btn" onclick="addTimeQuick('长白班')">长白班</button>
      <button class="quick-btn" onclick="addTimeQuick('夜班')">夜班</button>
      <button class="quick-btn" onclick="addTimeQuick('中班')">中班</button>
      <button class="quick-btn" onclick="addTimeQuick('两班倒')">两班倒</button>
      <button class="quick-btn" onclick="addTimeQuick('三班倒')">三班倒</button>
    </div>
  </div>
  <div class="input-item">
    <label>福利（非必填）</label>
    <div class="multi-input-row"><input id="welfare1" placeholder="福利1"><input id="welfare2" placeholder="福利2"></div>
    <div class="quick-group">
      <button class="quick-btn" onclick="addWelfare('住宿')">住宿</button>
      <button class="quick-btn" onclick="addWelfare('吃饭')">吃饭</button>
    </div>
  </div>
  <div class="input-item"><label>工厂定位（非必填，填写后可点击打开地图）</label><input id="location" placeholder="例如：无锡市滨湖区胡埭工业园"></div>
  
  <div class="input-item">
    <label>年龄区间（如18-40，非必填）</label>
    <div class="quick-group">
      <button class="quick-btn" onclick="fillAgeUnlimited()">不限</button>
    </div>
    <input type="text" id="ageRange" placeholder="例如：18-40 或直接输入4位数字">
  </div>
  
  <div class="input-item"><label>负责人（选填）</label><input id="contact"></div>
  <div class="input-item"><label>联系电话（选填）</label><input id="phone"></div>
  <div class="input-item"><label>补充信息（选填）</label><input id="extra"></div>

  <div class="save-back-row" style="position: fixed;bottom: 0;left: 0;right: 0;background: #fff;padding: 10px 12px;box-shadow: 0 -2px 8px rgba(0,0,0,0.1);z-index: 999;margin: 0;">
    <button class="btn" onclick="saveFactory()">保存工厂</button>
    <button class="btn" onclick="backToList()">返回</button>
  </div>
  </div>

<div class="modal" id="modal">
  <div class="modal-body">
    <div class="modal-content">
      <input id="edit-name" placeholder="工厂名称">
      <div class="input-item" style="margin-top:10px;">
        <label>地区</label>
        <div class="quick-group">
          <button class="quick-btn" onclick="editFillArea('马山')">马山</button>
          <button class="quick-btn" onclick="editFillArea('胡埭')">胡埭</button>
          <button class="quick-btn" onclick="editFillArea('雪堰桥')">雪堰桥</button>
        </div>
        <input id="edit-area" placeholder="地区">
      </div>
      <div style="margin:10px 0;">
        <label>工种（最多5个，非必填）</label>
        <div class="multi-input-row"><input id="edit-work1" placeholder="工种1"><input id="edit-work2" placeholder="工种2"></div>
        <div class="multi-input-row"><input id="edit-work3" placeholder="工种3"><input id="edit-work4" placeholder="工种4"></div>
        <div class="multi-input-row"><input id="edit-work5" placeholder="工种5"></div>
      </div>
      <input id="edit-gender" placeholder="性别">
      <div style="margin:10px 0;">
        <label>工价（最多5个，非必填）</label>
        <div class="multi-input-row"><input id="edit-price1" placeholder="工价1"><input id="edit-price2" placeholder="工价2"></div>
        <div class="multi-input-row"><input id="edit-price3" placeholder="工价3"><input id="edit-price4" placeholder="工价4"></div>
        <div class="multi-input-row"><input id="edit-price5" placeholder="工价5"></div>
      </div>
      <div style="margin:10px 0;">
        <label>工作时间</label>
        <div class="multi-input-row"><input id="edit-time1" placeholder="时间1"><input id="edit-time2" placeholder="时间2"></div>
        <div class="multi-input-row"><input id="edit-time3" placeholder="时间3"><input id="edit-time4" placeholder="时间4"></div>
        <div class="multi-input-row"><input id="edit-time5" placeholder="时间5"></div>
        <div class="quick-group">
          <button class="quick-btn" onclick="editAddTimeQuick('长白班')">长白班</button>
          <button class="quick-btn" onclick="editAddTimeQuick('夜班')">夜班</button>
          <button class="quick-btn" onclick="editAddTimeQuick('中班')">中班</button>
          <button class="quick-btn" onclick="editAddTimeQuick('两班倒')">两班倒</button>
          <button class="quick-btn" onclick="editAddTimeQuick('三班倒')">三班倒</button>
        </div>
      </div>
      <div style="margin:10px 0;">
        <label>福利</label>
        <div class="multi-input-row"><input id="edit-welfare1" placeholder="福利1"><input id="edit-welfare2" placeholder="福利2"></div>
        <div class="quick-group">
          <button class="quick-btn" onclick="editAddWelfare('住宿')">住宿</button>
          <button class="quick-btn" onclick="editAddWelfare('吃饭')">吃饭</button>
        </div>
      </div>
      <div class="input-item" style="margin-top:10px;">
        <label>工厂定位</label>
        <input id="edit-location" placeholder="例如：无锡市滨湖区胡埭工业园">
      </div>

      <div class="input-item">
        <label>年龄</label>
        <div class="quick-group">
          <button class="quick-btn" onclick="editFillAgeUnlimited()">不限</button>
        </div>
        <input id="edit-ageRange" placeholder="年龄">
      </div>
      <div class="input-item"><label>负责人</label><input id="edit-contact" placeholder="负责人"></div>
      <div class="input-item"><label>建议电话</label><input id="edit-phone" placeholder="建议电话"></div>
      <div class="input-item"><label>补充信息</label><input id="edit-extra" placeholder="补充信息"></div>
    </div>
    <div class="modal-footer">
      <div class="modal-btn">
        <button onclick="closeModal()" class="btn-cancel">取消</button>
        <button class="btn-save" onclick="saveEdit()">保存</button>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="detailModal">
  <div class="modal-body" onclick="event.stopPropagation()">
    <div class="modal-content">
      <h3 style="font-size:16px;text-align:center;margin-bottom:15px" id="detailFactoryName"></h3>
      <div style="font-size:14px;line-height:1.8;margin-bottom:20px;">
        <p><strong>地区：</strong><span id="detailArea"></span></p>
        <p><strong>工种：</strong><span id="detailWork"></span></p>
        <p><strong>性别要求：</strong><span id="detailGender"></span></p>
        <p><strong>工价：</strong><span id="detailSalary"></span></p>
        <p><strong>工作时间：</strong><span id="detailTime"></span></p>
        <p><strong>福利：</strong><span id="detailWelfare"></span></p>
        <p><strong>工厂定位：</strong><a id="detailLocation" class="map-link" target="_blank"></a></p>
        <p><strong>年龄区间：</strong><span id="detailAgeRange"></span></p>
        <p><strong>负责人：</strong><span id="detailContact"></span></p>
        <p><strong>联系电话：</strong><a href="tel:" id="detailPhoneLink" class="phone-link"></a></p>
        <p><strong>补充信息：</strong><span id="detailExtra"></span></p>
      </div>
    </div>
    <div class="modal-footer">
      <div class="factory-detail-actions">
        <button class="detail-action-btn edit-btn" onclick="openEditFromDetail()">编辑</button>
        <button class="detail-action-btn pause-btn" id="detailPauseBtn" onclick="togglePauseStatus()">停招</button>
        <button class="detail-action-btn delete-btn" onclick="deleteFromDetail()">删除</button>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="importModal">
  <div class="modal-body">
    <div class="modal-content">
      <h3 style="font-size:16px;text-align:center;margin-bottom:10px">导入资料</h3>
      <button class="btn" style="background:#1890ff;" onclick="document.getElementById('fileInput').click();return false;">选择本地TXT文件导入</button>
      <input type="file" id="fileInput" class="file-upload" accept=".txt">
      <div class="upload-tip">微信内请用下方「粘贴文本」方式导入</div>
      <hr style="border:0;border-top:1px solid #eee;margin:15px 0">
      <label style="font-size:14px;color:#333">粘贴TXT文本内容：</label>
      <textarea id="importText" placeholder="请将导出的TXT文件内容全选复制到这里..."></textarea>
    </div>
    <div class="modal-footer">
      <div class="modal-btn">
        <button onclick="closeImportModal()" class="btn-cancel">取消</button>
        <button class="btn-save" onclick="importFromText()">确认导入</button>
      </div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let factoryList = [];
let filter = {
  area: { all: true, list: [] },
  work: { all: true, list: [] },
  gender: null,
  salary: { all: true, list: [] },
  time: { all: true, list: [] },
  welfare: { all: true, list: [] }
};
let currentAge = null;
let editIndex = -1;
let detailIndex = -1;
let duplicateGroups = [];
let selectedDuplicates = new Set();
let searchKeyword = '';
let isDuplicateMode = false;
const groupColors = ['#fff0f0','#f0f8ff','#f0fff0','#fff8f0','#f5f0ff','#f0ffff','#fff0ff'];
let isWorkExpanded = false;

function toggleWorkExpand() { isWorkExpanded = !isWorkExpanded; renderFilter(); renderList(); }
function updateFactoryCount() { $('factoryCount').innerText = `当前共：${factoryList.length} 个工厂`; }

function doSearch() { searchKeyword = $('searchInput').value.trim().toLowerCase(); renderList(); }

function fillAgeUnlimited() { $('ageRange').value = '不限'; }
function editFillAgeUnlimited() { $('edit-ageRange').value = '不限'; }

function editFillArea(t){$('edit-area').value=t;}
function editAddTimeQuick(t){const a=['edit-time1','edit-time2','edit-time3','edit-time4','edit-time5'];for(let b of a)if(!$(b).value.trim())return $(b).value=t;}
function editAddWelfare(t){!$('edit-welfare1').value.trim()?$('edit-welfare1').value=t:!$('edit-welfare2').value.trim()&&($('edit-welfare2').value=t);}
function addTimeQuick(t){const a=['time1','time2','time3','time4','time5'];for(let b of a)if(!$(b).value.trim())return $(b).value=t;}
function addWelfare(t){!$('welfare1').value.trim()?$('welfare1').value=t:!$('welfare2').value.trim()&&($('welfare2').value=t);}

function saveToLocal(){ localStorage.setItem("factoryList",JSON.stringify(factoryList)); updateFactoryCount(); }

function parseAgeRange(str) {
  if (!str) return '不限';
  str = str.trim();
  if(str === '不限' || str === '0-100') return '不限';
  const numStr = str.replace(/\D/g, '');
  if (numStr.length === 4) { return numStr.slice(0,2) + '-' + numStr.slice(2); }
  return str || '不限';
}

function loadFromLocal(){
  const a=localStorage.getItem("factoryList");
  if(a) factoryList=JSON.parse(a);
  factoryList.forEach(a=>{
    if(a.isPaused===undefined) a.isPaused=false;
    if(!a.works) a.works=[a.work||""];
    if(!a.prices) a.prices=[a.salary||""];
    if(!a.times) a.times=[];
    if(!a.welfare) a.welfare=[];
  });
  updateFactoryCount();
}


function goAddPage(){ clearAddForm(); document.querySelectorAll(".page").forEach(a=>a.classList.remove("active")); $("page-add").classList.add("active"); }
function backToList(){ document.querySelectorAll(".page").forEach(a=>a.classList.remove("active")); $("page-list").classList.add("active"); isDuplicateMode=false; selectedDuplicates.clear(); $("fixedBottomBar").style.display="none"; renderAll(); }
function clearAddForm(){
  $("name").value=""; $("area").value="";
  $("work1").value="";$("work2").value="";$("work3").value="";$("work4").value="";$("work5").value="";
  $("gender").value="";
  $("price1").value="";$("price2").value="";$("price3").value="";$("price4").value="";$("price5").value="";
  $("time1").value="";$("time2").value="";$("time3").value="";$("time4").value="";$("time5").value="";
  $("welfare1").value="";$("welfare2").value="";
  $("location").value=""; $("ageRange").value=""; $("contact").value=""; $("phone").value=""; $("extra").value="";
}
function fillArea(t){$("area").value=t;}
function fillGender(t){$("gender").value=t;}

function saveFactory(){
  const works = [$("work1").value.trim(),$("work2").value.trim(),$("work3").value.trim(),$("work4").value.trim(),$("work5").value.trim()].filter(Boolean);
  const prices= [$("price1").value.trim(),$("price2").value.trim(),$("price3").value.trim(),$("price4").value.trim(),$("price5").value.trim()].filter(Boolean);
  const times = [$("time1").value.trim(),$("time2").value.trim(),$("time3").value.trim(),$("time4").value.trim(),$("time5").value.trim()].filter(Boolean);
  const welfares=[$("welfare1").value.trim(),$("welfare2").value.trim()].filter(Boolean);
  const ageRaw = $("ageRange").value.trim();
  const ageRange = parseAgeRange(ageRaw);
  const factory={
    name:$("name").value.trim(), area:$("area").value.trim(), work:works.join("、"), works:works,
    gender:$("gender").value.trim(), salary:prices.join("、"), prices:prices, times:times, timeText:times.join("、"),
    welfare:welfares, welfareText:welfares.join("、"), location:$("location").value.trim(),
    ageRange:ageRange, contact:$("contact").value.trim(), phone:$("phone").value.trim(), extra:$("extra").value.trim(), isPaused:false
  };
  if(!factory.name || !factory.area){ alert("请填写工厂名称和地区"); return; }
  factoryList.push(factory); saveToLocal(); backToList();
}

function resetAge(){ currentAge=null; $("ageShow").innerText="年龄：不限"; renderList(); }
function updateAge(){ currentAge=parseInt($("ageSlider").value); $("ageShow").innerText=`年龄：${currentAge}岁`; renderList(); }
function resetAllFilters(){
  filter={ area:{all:true,list:[]}, work:{all:true,list:[]}, gender:null, salary:{all:true,list:[]}, time:{all:true,list:[]}, welfare:{all:true,list:[]} };
  currentAge=null; $("ageSlider").value=30; $("ageShow").innerText="年龄：不限"; $('searchInput').value=""; searchKeyword=""; isWorkExpanded=false; renderAll();
}
function renderAll(){ renderFilter(); renderList(); }

function renderFilter(){
  const areas = [...new Set(factoryList.map(f=>f.area).filter(Boolean))];
  const works = [...new Set(factoryList.flatMap(f=>f.works||[]).filter(Boolean))];
  
  const salaries = [...new Set(factoryList.flatMap(f=>f.prices||[]).filter(Boolean))].sort((a,b)=>{
    const na = parseFloat(a.replace(/\D/g,'')) || 0;
    const nb = parseFloat(b.replace(/\D/g,'')) || 0;
    return na - nb;
  });

  const times=[...new Set(factoryList.flatMap(f=>f.times||[]).filter(Boolean))];
  const welfares=[...new Set(factoryList.flatMap(f=>f.welfare||[]).filter(Boolean))];
  const genders=["男","女"];
  
  function renderOne(containerId,key,list){
    const el=$(containerId); el.innerHTML="";
    const allCls=filter[key].all?"active":"";
    el.innerHTML+=`<button class="quick-btn ${allCls}" onclick="setMultiAll('${key}')">不限</button>`;
    if(key==='work'){ el.innerHTML+=`<button class="quick-btn" onclick="toggleWorkExpand()">${isWorkExpanded ? '隐藏' : '显示'}</button>`; if(!isWorkExpanded) return; }
    list.forEach(item=>{ const cls=!filter[key].all && filter[key].list.includes(item)?"active":""; el.innerHTML+=`<button class="quick-btn ${cls}" onclick="toggleMulti('${key}','${item}')">${item}</button>`; });
  }
  function renderGender(){
    const el=$("filter-gender"); el.innerHTML=`<button class="quick-btn ${filter.gender==null?'active':''}" onclick="setGender(null)">不限</button>`;
    genders.forEach(g=>{ const cls=filter.gender==g?"active":""; el.innerHTML+=`<button class="quick-btn ${cls}" onclick="setGender('${g}')">${g}</button>`; });
  }
  renderOne("filter-area","area",areas); renderOne("filter-work","work",works); renderOne("filter-salary","salary",salaries);
  renderOne("filter-time","time",times); renderOne("filter-welfare","welfare",welfares); renderGender();
}
function setMultiAll(key){ filter[key].all=true; filter[key].list=[]; if(key==="work") isWorkExpanded=false; renderFilter(); renderList(); }
function toggleMulti(key,val){
  if(filter[key].all){ filter[key].all=false; filter[key].list=[val]; }else{
    const i=filter[key].list.indexOf(val); if(i>-1) filter[key].list.splice(i,1); else filter[key].list.push(val);
    if(filter[key].list.length===0) filter[key].all=true;
  } renderFilter(); renderList();
}
function setGender(g){ filter.gender=g; renderFilter(); renderList(); }

function renderList() {
  let showList = isDuplicateMode ? [] : [...factoryList];
  if (isDuplicateMode) { duplicateGroups.forEach(g=>g.forEach(idx=>showList.push(factoryList[idx]))); factoryList.forEach(f=>{ if(!duplicateGroups.some(g=>g.includes(factoryList.indexOf(f)))) showList.push(f); }); }
  
  let filtered = showList.filter(f=>{
    let ok=true;
    if(!filter.area.all && !filter.area.list.includes(f.area)) ok=false;
    if(!filter.work.all && !f.works.some(w=>filter.work.list.includes(w))) ok=false;
    if(filter.gender!=null && f.gender!=filter.gender) ok=false;
    if(!filter.salary.all && !f.prices.some(p=>filter.salary.list.includes(p))) ok=false;
    if(!filter.time.all){ const hasAny=filter.time.list.some(t=>f.times&&f.times.includes(t)); if(!hasAny) ok=false; }
    if(!filter.welfare.all && !f.welfare.some(w=>filter.welfare.list.includes(w))) ok=false;
    if(currentAge!=null && f.ageRange && f.ageRange !== '不限'){ const arr=f.ageRange.split('-').map(Number); if(arr.length!==2 || currentAge<arr[0] || currentAge>arr[1]) ok=false; }
    if(searchKeyword && !f.name.toLowerCase().includes(searchKeyword)) ok=false;
    return ok;
  });

  if(!filter.time.all && filter.time.list.length === 1){
    const target = filter.time.list[0];
    filtered.sort((a,b)=>{
      const aHas = a.times && a.times.includes(target);
      const bHas = b.times && b.times.includes(target);
      if (aHas !== bHas) return bHas - aHas;

      const aOnly = a.times.length === 1;
      const bOnly = b.times.length === 1;
      return bOnly - aOnly;
    });
  }

  let html='';
  filtered.forEach(f=>{
    const realIdx=factoryList.indexOf(f);
    let bg = '#fff';
    let borderStyle = '';

    if(isDuplicateMode){
      duplicateGroups.forEach((g,gi)=>{
        if(g.includes(realIdx)) bg=groupColors[gi%groupColors.length];
      });
    }

    const checkbox=isDuplicateMode?`<input type="checkbox" class="duplicate-checkbox" ${selectedDuplicates.has(realIdx)?'checked':''} onclick="toggleDuplicateSelection(${realIdx})">`:'';
    
    const workText = (f.work && f.work.trim() !== '') ? f.work : 
                    (f.works && f.works.length > 0) ? f.works.join('、') : '-';
    const salaryText = (f.salary && f.salary.trim() !== '') ? f.salary : '-';
    const timeText = (f.timeText && f.timeText.trim() !== '') ? f.timeText : '-';
    const welfareText = (f.welfareText && f.welfareText.trim() !== '') ? f.welfareText : '-';
    const genderText = (f.gender && f.gender.trim() !== '') ? f.gender : '-';
    const contactText = (f.contact && f.contact.trim() !== '') ? f.contact : '-';
    const phoneText = (f.phone && f.phone.trim() !== '') ? 
      `<span class="phone-link" onclick="event.stopPropagation();window.location.href='tel:${f.phone}'">${f.phone}</span>` : '-';
const locationText = (f.location && f.location.trim() !== '') ? 
  `<a href="amapuri://poi?sourceApplication=劳务筛选系统&keywords=${encodeURIComponent(f.location.trim())}" class="map-link" onclick="event.stopPropagation();window.location.href=this.href;return false;">${f.location}</a>` : '-';
    html+=`
    <div class="factory-item" style="background:${bg};${borderStyle}" onclick="${!isDuplicateMode?`openDetailModal(${realIdx})`:''}">
      ${checkbox}
      <div class="factory-content">
        ${f.isPaused?'<div class="paused-label">⚠️ 已停招</div>':''}
        <div class="factory-name">${f.name}</div>
        <div class="factory-info">
          工种：${workText}｜地区：${f.area || '-'}<br>
          工价：${salaryText}｜时间：${timeText}<br>
          福利：${welfareText}｜定位：${locationText}<br>
          性别：${genderText}｜年龄：${f.ageRange || '不限'}<br>
          负责人：${contactText}｜电话：${phoneText}
        </div>
      </div>
    </div>`;
  });
  $('factory-list').innerHTML=filtered.length?html:'<div style="padding:20px;text-align:center">暂无匹配数据</div>';
}

function openDetailModal(i){
  detailIndex=i; const f=factoryList[i];
  $("detailFactoryName").innerText=f.name; $("detailArea").innerText=f.area || '-';
  
  $("detailWork").innerText = (f.work && f.work.trim() !== '') ? f.work : 
                             (f.works && f.works.length > 0) ? f.works.join('、') : '-';
  $("detailGender").innerText = (f.gender && f.gender.trim() !== '') ? f.gender : '-';
  $("detailSalary").innerText = (f.salary && f.salary.trim() !== '') ? f.salary : '-';
  $("detailTime").innerText = (f.timeText && f.timeText.trim() !== '') ? f.timeText : '-';
  $("detailWelfare").innerText = (f.welfareText && f.welfareText.trim() !== '') ? f.welfareText : '-';
  
const locEl = $("detailLocation");
if(f.location && f.location.trim() !== '') {
  const addr = encodeURIComponent(f.location.trim());
  locEl.href = `amapuri://search?sourceApplication=appname&keywords=${addr}`;
  locEl.innerText = f.location;
  locEl.onclick = function(e) {
    e.preventDefault();
    e.stopPropagation();
    window.location.href = this.href;
  };
} else {
  locEl.innerText = '-';
  locEl.removeAttribute('href');
  locEl.onclick = null;
}  
  $("detailAgeRange").innerText = (f.ageRange && f.ageRange.trim() !== '') ? f.ageRange : '不限';
  $("detailContact").innerText = (f.contact && f.contact.trim() !== '') ? f.contact : '-';
  $("detailPhoneLink").innerText = (f.phone && f.phone.trim() !== '') ? f.phone : '-';
  $("detailPhoneLink").href = (f.phone && f.phone.trim() !== '') ? 'tel:' + f.phone : '#';
  $("detailExtra").innerText = (f.extra && f.extra.trim() !== '') ? f.extra : '-';
  $("detailPauseBtn").innerText=f.isPaused?'恢复招聘':'停招';
  $("detailPauseBtn").className=f.isPaused?'detail-action-btn resume-btn':'detail-action-btn pause-btn';
  $("detailModal").style.display='flex';
}
$("detailModal").onclick=()=>{$("detailModal").style.display='none';detailIndex=-1;};
function openEditFromDetail(){if(detailIndex!==-1){openEdit(detailIndex);closeDetailModal();}}
function togglePauseStatus(){if(detailIndex!==-1){factoryList[detailIndex].isPaused=!factoryList[detailIndex].isPaused;saveToLocal();renderList();closeDetailModal();}}
function deleteFromDetail(){if(detailIndex!==-1&&confirm("确定删除？")){factoryList.splice(detailIndex,1);saveToLocal();closeDetailModal();renderAll();}}
function closeDetailModal(){$("detailModal").style.display='none';detailIndex=-1;}

function openEdit(i){
  editIndex=i; const f=factoryList[i];
  $("edit-name").value=f.name; $("edit-area").value=f.area;
  const ws=f.works||['','','','','']; $("edit-work1").value=ws[0]||'';$("edit-work2").value=ws[1]||'';$("edit-work3").value=ws[2]||'';$("edit-work4").value=ws[3]||'';$("edit-work5").value=ws[4]||'';
  $("edit-gender").value=f.gender;
  const ps=f.prices||['','','','','']; $("edit-price1").value=ps[0]||'';$("edit-price2").value=ps[1]||'';$("edit-price3").value=ps[2]||'';$("edit-price4").value=ps[3]||'';$("edit-price5").value=ps[4]||'';
  const ts=f.times||['','','','','']; $("edit-time1").value=ts[0]||'';$("edit-time2").value=ts[1]||'';$("edit-time3").value=ts[2]||'';$("edit-time4").value=ts[3]||'';$("edit-time5").value=ts[4]||'';
  const wfs=f.welfare||['','']; $("edit-welfare1").value=wfs[0]||'';$("edit-welfare2").value=wfs[1]||'';
  $("edit-location").value=f.location||''; $("edit-ageRange").value=f.ageRange||''; $("edit-contact").value=f.contact||''; $("edit-phone").value=f.phone||''; $("edit-extra").value=f.extra||'';
  $("modal").style.display='flex';
}
function closeModal(){$("modal").style.display='none';}
function saveEdit(){
  const i=editIndex; const f=factoryList[i];
  const works=[$("edit-work1").value.trim(),$("edit-work2").value.trim(),$("edit-work3").value.trim(),$("edit-work4").value.trim(),$("edit-work5").value.trim()].filter(Boolean);
  const prices=[$("edit-price1").value.trim(),$("edit-price2").value.trim(),$("edit-price3").value.trim(),$("edit-price4").value.trim(),$("edit-price5").value.trim()].filter(Boolean);
  const times=[$("edit-time1").value.trim(),$("edit-time2").value.trim(),$("edit-time3").value.trim(),$("edit-time4").value.trim(),$("edit-time5").value.trim()].filter(Boolean);
  const welfares=[$("edit-welfare1").value.trim(),$("edit-welfare2").value.trim()].filter(Boolean);
  const ageRaw=$("edit-ageRange").value.trim(); const ageRange=parseAgeRange(ageRaw);
  factoryList[i]={
    ...f, name:$("edit-name").value.trim(), area:$("edit-area").value.trim(), work:works.join("、"), works:works,
    gender:$("edit-gender").value.trim(), salary:prices.join("、"), prices:prices, times:times, timeText:times.join("、"),
    welfare:welfares, welfareText:welfares.join("、"), location:$("edit-location").value.trim(),
    ageRange:ageRange, contact:$("edit-contact").value.trim(), phone:$("edit-phone").value.trim(), extra:$("edit-extra").value.trim()
  };
  saveToLocal(); closeModal(); renderAll();
}

function exportFactoryToTxt(){
  let txt="创才劳务工厂信息\n\n";
  factoryList.forEach((f,i)=>{
    txt+=`【工厂${i+1}】${f.name}\n`;
    txt+=`地区：${f.area}｜工种：${f.work||f.works.join('、')||'-'}\n`;
    txt+=`工资：${f.salary||'-'}｜工作时间：${f.timeText||'-'}\n`;
    txt+=`性别要求：${f.gender}｜年龄区间：${f.ageRange}\n`;
    txt+=`负责人：${f.contact||'-'}｜联系电话：${f.phone||'-'}\n`;
    txt+=`补充信息：${f.extra||'-'}\n\n`;
  });
  const blob=new Blob([txt],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="工厂信息.txt"; a.click();
  URL.revokeObjectURL(url);
}

function openImportModal(){$("importModal").style.display='flex';}
function closeImportModal(){$("importModal").style.display='none';$("importText").value='';}

// 👇 这里已修复：重复选同一个文件也能导入
$("fileInput").addEventListener("change",e=>{
  const file=e.target.files[0]; 
  if(file){ 
    const reader=new FileReader(); 
    reader.onload=ev=>{
      $("importText").value=ev.target.result;
    }; 
    reader.readAsText(file,"utf-8"); 
  }
});
$("fileInput").addEventListener("click", e => {
  e.target.value = '';
});

function importFromText(){
  const txt=$("importText").value.trim(); if(!txt){alert("请粘贴导入内容");return;}
  try{
    const lines=txt.split('\n'); const list=[]; let cur=null;
    lines.forEach(line=>{
      line=line.trim(); if(!line)return;
      if(line.startsWith('【工厂')){
        if(cur)list.push(cur);
        const name=line.replace(/【工厂\d+】/,'').trim();
        cur={ name,area:'',work:'',works:[],gender:'', prices:[],times:[],timeText:'',welfare:[],welfareText:'', location:'',ageRange:'不限',contact:'',phone:'',extra:'',isPaused:false };
      }else if(cur){
        if(line.startsWith('地区：')){
          const ps=line.split('|');
          if(ps.length>=2){
            cur.area=ps[0].replace('地区：','').trim();
            let workStr=ps[1].replace('工种：','').trim();
            cur.work=workStr;
            cur.works=workStr?workStr.split('、').map(s=>s.trim()).filter(Boolean):[];
          }
        }
        else if(line.startsWith('工资：')){
          const ps=line.split('|');
          if(ps.length>=2){
            cur.salary=ps[0].replace('工资：','').trim();
            cur.prices=cur.salary?cur.salary.split('、').filter(Boolean):[];
            cur.timeText=ps[1].replace('工作时间：','').trim();
            cur.times=cur.timeText?cur.timeText.split(/\s+/).filter(Boolean):[];
          }
        }
        else if(line.startsWith('性别要求：')){
          const ps=line.split('|');
          if(ps.length>=2){
            cur.gender=ps[0].replace('性别要求：','').trim();
            let ageStr = ps[1].replace('年龄区间：','').trim();
            cur.ageRange=parseAgeRange(ageStr);
          }
        }
        else if(line.startsWith('负责人：')){
          const ps=line.split('|');
          if(ps.length>=2){
            cur.contact=ps[0].replace('负责人：','').trim();
            cur.phone=ps[1].replace('联系电话：','').trim();
          }
        }
        else if(line.startsWith('补充信息：')){
          cur.extra=line.replace('补充信息：','').trim();
        }
      }
    });
    if(cur)list.push(cur);
    if(list.length){ factoryList.push(...list); saveToLocal(); alert(`导入成功，追加 ${list.length} 条`); closeImportModal(); backToList(); }else{ alert("未识别到数据"); }
  }catch(e){ alert("导入失败："+e); }
}

function compareAndMarkDuplicates(){
  if(factoryList.length<2){alert("数据太少");return;}
  const map={}; factoryList.forEach((f,i)=>{ const key=`${f.name.trim()}|${f.area.trim()}`; if(!map[key])map[key]=[]; map[key].push(i); });
  duplicateGroups=Object.values(map).filter(g=>g.length>=2);
  if(!duplicateGroups.length){alert("无重复");return;}
  isDuplicateMode=true; selectedDuplicates.clear(); $("fixedBottomBar").style.display='flex'; renderList(); alert(`找到 ${duplicateGroups.length} 组重复`);
}
function toggleDuplicateSelection(idx){ if(selectedDuplicates.has(idx))selectedDuplicates.delete(idx); else selectedDuplicates.add(idx); renderList(); }
function selectAllDuplicates(){
  if(!isDuplicateMode)return;
  duplicateGroups.flat().forEach(idx=>selectedDuplicates.add(idx));
  renderList();
}
function cancelDuplicateSelection(){ isDuplicateMode=false; selectedDuplicates.clear(); $("fixedBottomBar").style.display='none'; renderList(); }
function deleteSelectedDuplicates(){
  if(selectedDuplicates.size===0){alert("请勾选");return;} if(!confirm("确定删除勾选？"))return;
  const toDel=Array.from(selectedDuplicates).sort((a,b)=>b-a); toDel.forEach(i=>factoryList.splice(i,1));
  saveToLocal(); selectedDuplicates.clear(); isDuplicateMode=false; $("fixedBottomBar").style.display='none'; renderList();
}

// 长按清空全部
function initLongPressClearAll() {
  const el = $('factoryCount');
  let timer = null;
  el.addEventListener('touchstart', function(e) {
    timer = setTimeout(() => {
      if(confirm('确定要清空所有工厂数据吗？此操作不可恢复！')) {
        factoryList = [];
        saveToLocal();
        renderAll();
        alert('已清空全部工厂信息');
      }
    }, 500);
  });
  el.addEventListener('touchend', function(e) {
    clearTimeout(timer);
  });
  el.addEventListener('touchmove', function(e) {
    clearTimeout(timer);
  });
}

window.onload=()=>{loadFromLocal();renderAll();initLongPressClearAll();};
</script>
